amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 10.0
    laser_min_range: 0.15
    laser_model_type: "likelihood_field"
    max_beams: 80
    max_particles: 2000
    min_particles: 400
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::OmniMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 0.5
    update_min_a: 0.15
    update_min_d: 0.20
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: /scan
    set_initial_pose: false
    always_reset_initial_pose: false

map_server:
  ros__parameters:
    use_sim_time: false
    topic_name: /map
    frame_id: map
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: false
    # Replan faster so the rover reacts earlier to moving people or objects.
    expected_planner_frequency: 8.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.30
      downsample_costmap: false
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 1.5
      motion_model_for_search: "REEDS_SHEPP"
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 6.5
      analytic_expansion_max_cost: 180.0
      analytic_expansion_max_cost_override: false
      minimum_turning_radius: 1.30
      reverse_penalty: 2.5
      change_penalty: 0.1
      non_straight_penalty: 1.30
      cost_penalty: 3.0
      retrospective_penalty: 0.025

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.18
      movement_time_allowance: 6.0
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.45
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.45
      lookahead_dist: 0.75
      min_lookahead_dist: 0.80
      max_lookahead_dist: 1.10
      lookahead_time: 1.2
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.08
      approach_velocity_scaling_dist: 1.2
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.5
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 1.30
      regulated_linear_scaling_min_speed: 0.08
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.80
      cost_scaling_gain: 0.80
      inflation_cost_scaling_factor: 2.5
      use_rotate_to_heading: false
      allow_reversing: true
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 0.5
      transform_tolerance: 0.25
      stateful: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["savitzky_golay_smoother"]
    savitzky_golay_smoother:
      plugin: "nav2_smoother::SavitzkyGolaySmoother"
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 8.0
    behavior_plugins: ["backup", "wait"]
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.2
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.5
    min_rotational_vel: 0.1
    rotational_acc_lim: 0.6

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom/raw
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    default_nav_to_pose_bt_xml: ""
    default_nav_through_poses_bt_xml: ""
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_smooth_path_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_assisted_teleop_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_drive_on_heading_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_globally_updated_goal_condition_bt_node
      - nav2_is_path_valid_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_truncate_path_local_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_goal_updated_controller_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node
      - nav2_controller_cancel_bt_node
      - nav2_path_longer_on_approach_bt_node
      - nav2_wait_cancel_bt_node
      - nav2_spin_cancel_bt_node
      - nav2_back_up_cancel_bt_node
      - nav2_assisted_teleop_cancel_bt_node
      - nav2_drive_on_heading_cancel_bt_node
      - nav2_is_battery_charging_condition_bt_node

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 0

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.45, 0.0, 0.55]
    min_velocity: [-0.20, 0.0, -0.55]
    max_accel: [0.40, 0.0, 0.55]
    max_decel: [-0.50, 0.0, -0.65]
    odom_topic: /odom/raw
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 0.6

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      # The local costmap is where we fuse lidar and camera for close-range safety.
      update_frequency: 12.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 8.0
      height: 8.0
      resolution: 0.05
      transform_tolerance: 0.25
      footprint: "[[0.64, 0.525], [0.64, -0.525], [-0.64, -0.525], [-0.64, 0.525]]"
      footprint_padding: 0.08
      plugins: ["obstacle_layer", "voxel_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        combination_method: 1
        footprint_clearing_enabled: true
        max_obstacle_height: 1.50
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: true
          marking: true
          inf_is_valid: true
          max_obstacle_height: 1.50
          obstacle_max_range: 8.0
          obstacle_min_range: 0.10
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_map: false
        footprint_clearing_enabled: true
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 20
        max_obstacle_height: 1.60
        unknown_threshold: 15
        mark_threshold: 0
        combination_method: 1
        observation_sources: pointcloud
        pointcloud:
          topic: /sensors/camera/depth/color/points
          data_type: "PointCloud2"
          transport_type: "raw"
          clearing: true
          marking: true
          min_obstacle_height: 0.08
          max_obstacle_height: 1.20
          obstacle_max_range: 3.5
          obstacle_min_range: 0.20
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5
        inflation_radius: 0.95
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      # Keep the global costmap conservative and stable with map + lidar only.
      update_frequency: 3.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      transform_tolerance: 0.5
      track_unknown_space: true
      footprint: "[[0.64, 0.525], [0.64, -0.525], [-0.64, -0.525], [-0.64, 0.525]]"
      footprint_padding: 0.08
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_subscribe_transient_local: true
        subscribe_to_updates: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        combination_method: 1
        footprint_clearing_enabled: true
        max_obstacle_height: 1.50
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          clearing: true
          marking: true
          inf_is_valid: true
          max_obstacle_height: 1.50
          obstacle_max_range: 10.0
          obstacle_min_range: 0.10
          raytrace_max_range: 12.0
          raytrace_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.8
        inflation_radius: 1.10
      always_send_full_costmap: true

collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "/cmd_vel_smoothed"
    cmd_vel_out_topic: "/cmd_vel"
    transform_tolerance: 0.3
    # Tolerant timeout to avoid false stops over WiFi or under CPU load.
    source_timeout: 1.5
    base_shift_correction: true
    stop_pub_timeout: 0.5
    polygons: ["PolygonStop", "PolygonSlow", "FootprintApproach"]
    PolygonStop:
      type: "polygon"
      points: [1.00, 0.72, 1.00, -0.72, -0.35, -0.72, -0.35, 0.72]
      action_type: "stop"
      max_points: 4
      visualize: true
      polygon_pub_topic: "/collision_monitor/polygon_stop"
      enabled: true
    PolygonSlow:
      type: "polygon"
      points: [1.45, 0.90, 1.45, -0.90, -0.55, -0.90, -0.55, 0.90]
      action_type: "slowdown"
      slowdown_ratio: 0.35
      max_points: 4
      visualize: true
      polygon_pub_topic: "/collision_monitor/polygon_slow"
      enabled: true
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      max_points: 6
      visualize: false
      enabled: true
    observation_sources: ["scan", "pointcloud"]
    scan:
      type: "scan"
      topic: "/scan"
      enabled: true
      source_timeout: 1.0
    pointcloud:
      type: "pointcloud"
      topic: "/sensors/camera/depth/color/points"
      min_height: 0.08
      max_height: 1.20
      enabled: true
      source_timeout: 1.5

lifecycle_manager_localization:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - map_server
      - amcl
